name: Deploy static portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh pinned repositories every day at 04:17 UTC.
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch pinned GitHub repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: CHashtager
        run: node scripts/fetch-pinned.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
